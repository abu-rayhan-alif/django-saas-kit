<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Django SaaS Kit{% endblock %}</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background-color: #f4f4f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #18181b;
        -webkit-font-smoothing: antialiased;
      }
      .wrapper {
        max-width: 560px;
        margin: 40px auto;
        background: #ffffff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      }
      .header {
        background-color: #18181b;
        padding: 24px 32px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .header-logo {
        font-size: 20px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.5px;
      }
      .header-badge {
        font-size: 11px;
        font-weight: 600;
        color: #a1a1aa;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-left: auto;
      }
      .body {
        padding: 32px;
      }
      .body p {
        margin-bottom: 16px;
        font-size: 15px;
        line-height: 1.65;
        color: #3f3f46;
      }
      .body p:last-child { margin-bottom: 0; }
      .cta-wrap { margin: 24px 0; }
      .cta {
        display: inline-block;
        padding: 12px 24px;
        background-color: #18181b;
        color: #ffffff !important;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.1px;
      }
      .cta:hover { background-color: #27272a; }
      .cta.cta-danger { background-color: #dc2626; }
      .cta.cta-info  { background-color: #2563eb; }
      .divider {
        border: none;
        border-top: 1px solid #f4f4f5;
        margin: 24px 0;
      }
      .alert-box {
        background: #fef2f2;
        border-left: 4px solid #ef4444;
        border-radius: 4px;
        padding: 14px 16px;
        margin: 20px 0;
        font-size: 14px;
        color: #7f1d1d;
        line-height: 1.5;
      }
      .alert-box.info {
        background: #eff6ff;
        border-color: #3b82f6;
        color: #1e3a5f;
      }
      .code-block {
        background: #f4f4f5;
        border-radius: 6px;
        padding: 14px 18px;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 14px;
        color: #18181b;
        letter-spacing: 0.5px;
        margin: 16px 0;
        word-break: break-all;
      }
      .meta-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: #71717a;
        margin-bottom: 6px;
      }
      .meta-row strong { color: #3f3f46; }
      .footer {
        padding: 20px 32px;
        border-top: 1px solid #f4f4f5;
        font-size: 12px;
        color: #a1a1aa;
        text-align: center;
        line-height: 1.6;
      }
      .footer a { color: #71717a; text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="header">
        <span class="header-logo">Django SaaS Kit</span>
        <span class="header-badge">{% block badge %}Notification{% endblock %}</span>
      </div>
      <div class="body">
        {% block content %}{% endblock %}
      </div>
      <div class="footer">
        {% block footer %}
          You received this email from Django SaaS Kit.<br />
          If you did not expect it, you can safely ignore it.
        {% endblock %}
      </div>
    </div>
  </body>
</html>
