# All credentials are read from .env (copy .env.example → .env).
# Defaults are safe for local dev only — never use in production.

x-postgres-url: &postgres-url >-
  postgres://${POSTGRES_USER:-saas_user}:${POSTGRES_PASSWORD:-saas_pass}@db:5432/${POSTGRES_DB:-saas_db}

x-app-env: &app-env
  DJANGO_SETTINGS_MODULE: config.settings.local
  DATABASE_URL: "postgres://${POSTGRES_USER:-saas_user}:${POSTGRES_PASSWORD:-saas_pass}@db:5432/${POSTGRES_DB:-saas_db}"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"
  USE_S3: "True"
  AWS_ACCESS_KEY_ID: "${MINIO_ACCESS_KEY:-minioadmin}"
  AWS_SECRET_ACCESS_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
  AWS_STORAGE_BUCKET_NAME: "${MINIO_BUCKET_NAME:-saas-media}"
  AWS_S3_ENDPOINT_URL: "http://minio:9000"
  AWS_S3_CUSTOM_DOMAIN: "localhost:9000/${MINIO_BUCKET_NAME:-saas-media}"

x-app-depends: &app-depends
  db:
    condition: service_healthy
  redis:
    condition: service_healthy
  minio-init:
    condition: service_completed_successfully

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: development
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      <<: *app-env
    depends_on:
      <<: *app-depends

  celery:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: celery-worker
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      <<: *app-env
    depends_on:
      <<: *app-depends

  celery-beat:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: celery-beat
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      <<: *app-env
    depends_on:
      <<: *app-depends

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-saas_db}"
      POSTGRES_USER: "${POSTGRES_USER:-saas_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-saas_pass}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas_user} -d ${POSTGRES_DB:-saas_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible local object storage) ──────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-minioadmin}"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot service: creates the media bucket if it doesn't exist.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin} &&
        mc mb --ignore-existing local/${MINIO_BUCKET_NAME:-saas-media} &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
