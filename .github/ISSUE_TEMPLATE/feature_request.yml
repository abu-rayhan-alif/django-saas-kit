name: Feature Request
description: Suggest a new feature or improvement (public GitHub Issues)
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Use this form for **public** feature discussion on GitHub.

        For architecture changes, expect an ADR in `docs/adr/` with the PR. Label `adr` applies.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      placeholder: As a [user type], I want [goal] so that [benefit].
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Authentication / JWT
        - Multi-tenancy
        - RBAC
        - Notifications
        - API / DRF
        - Docker / DevOps
        - Documentation
        - Privacy / GDPR
        - Other
    validations:
      required: true

  - type: checkboxes
    id: labels_hint
    attributes:
      label: Suggested labels
      options:
        - label: Architecture (`adr`)
        - label: Documentation (`docs`)
        - label: Privacy / GDPR (`gdpr`)
        - label: Testing (`testing`)

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: This fits the SaaS starter scope (not app-specific business logic only)
          required: true
        - label: I am willing to contribute a PR (optional)
