name: Bug Report
description: Report a bug or unexpected behavior (public GitHub Issues)
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. **Do not** file security vulnerabilities here —
        use [SECURITY.md](https://github.com/abu-rayhan-alif/django-saas-kit/blob/main/SECURITY.md) instead.

        Maintainers track public work on GitHub Issues; private planning may start in personal Jira first.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What you expected vs. what actually happened.
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `make dev`
        2. Call `POST /api/v1/...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: How are you running the project?
      options:
        - Docker Compose (`make dev`)
        - Docker Compose (production)
        - Local Python (venv)
        - GitHub Actions CI
        - Other
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: e.g. 3.12.4

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / traceback
      render: shell

  - type: checkboxes
    id: labels_hint
    attributes:
      label: Applicable areas (maintainers may add labels)
      options:
        - label: Tests / CI (`testing`)
        - label: Documentation (`docs`)
        - label: Privacy / data (`gdpr`)

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this one
          required: true
        - label: I am willing to open a PR to fix this (optional)
