# Dependabot — automated dependency updates (SAAS-703)
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Python (requirements/*.txt, pyproject.toml)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    # 3.17+ needs django-stubs 6 / Django 5.2+ — see requirements/local.txt
    ignore:
      - dependency-name: djangorestframework-stubs
        versions: [">=3.17.0"]
      - dependency-name: django-stubs
        versions: [">=6.0.0"]
    commit-message:
      prefix: deps
      prefix-development: deps
      include: scope

  # GitHub Actions (e.g. .github/workflows/ci.yml)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: ci
      include: scope
