name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.local

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/local.txt

      - name: Run ruff (linter)
        run: ruff check .

      - name: Run ruff (formatter)
        run: ruff format --check .

      - name: Run mypy (type check)
        env:
          DJANGO_SETTINGS_MODULE: config.settings.mypy
        run: mypy .

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: saas_test
          POSTGRES_USER: saas_user
          POSTGRES_PASSWORD: saas_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/local.txt

      - name: Copy env file
        run: cp .env.example .env

      - name: Run migrations
        env:
          DATABASE_URL: postgres://saas_user:saas_pass@localhost:5432/saas_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: "True"
        run: python manage.py migrate

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgres://saas_user:saas_pass@localhost:5432/saas_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: "True"
        run: |
          pytest --cov=config --cov=services --cov-report=xml --cov-report=term-missing --cov-fail-under=80 -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          target: runtime
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: django-saas-kit:ci