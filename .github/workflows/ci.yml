# GitHub Actions CI (SAAS-801)
# Lint → Test (Postgres + Redis) → Docker build | Coverage gate: 80%

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.test
  COVERAGE_FAIL_UNDER: "80"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        # mypy is skipped here — it runs as a dedicated step below with the
        # full requirements installed, which is faster than the mirrors-mypy hook.
        # Do not set PIP_CONSTRAINT here — pre-commit installs hooks from a cache dir
        # where a relative constraints path does not exist.
        run: SKIP=mypy pre-commit run --all-files

      - name: Install dependencies (for mypy)
        run: bash scripts/ci_install_requirements.sh

      - name: Mypy (type check)
        env:
          DJANGO_SETTINGS_MODULE: config.settings.mypy
        run: mypy .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: saas_test
          POSTGRES_USER: saas_user
          POSTGRES_PASSWORD: saas_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saas_user -d saas_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: bash scripts/ci_install_requirements.sh

      - name: Copy env file
        run: cp .env.example .env

      - name: Run migrations
        env:
          DATABASE_URL: postgres://saas_user:saas_pass@localhost:5432/saas_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver,.localhost
        run: python manage.py migrate

      - name: Pytest with coverage (fail under ${{ env.COVERAGE_FAIL_UNDER }}%)
        env:
          DATABASE_URL: postgres://saas_user:saas_pass@localhost:5432/saas_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver,.localhost
        run: |
          pytest \
            --cov=apps \
            --cov=config \
            --cov=services \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=${{ env.COVERAGE_FAIL_UNDER }} \
            -v

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r apps/ services/ config/ \
            --severity-level medium \
            --confidence-level medium \
            --exit-zero \
            -f json -o bandit-report.json
          bandit -r apps/ services/ config/ \
            --severity-level high \
            --confidence-level high

      - name: Upload Bandit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 14
